services:
  sentinel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-ai
    ports:
      - "5000:5000"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      SENTINEL_LLM_API_URL: http://host.docker.internal:11434
      DASHBOARD_AUTH_ENABLED: "true"
    env_file:
      - .env.example
    restart: unless-stopped
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
